<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Studio</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="brand">
        <button class="brand-logo" id="collapse-toggle" aria-label="Collapse or expand sidebar" title="Collapse / expand">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 12h0M8 8v8M12 4v16M16 8v8M20 11v2"/></svg>
        </button>
        <div class="brand-text">
          <div class="brand-title">Live Studio</div>
          <div class="brand-sub">super · extension</div>
        </div>
      </div>
      <nav id="nav"><!-- modules injected --></nav>
      <div class="sidebar-foot">
        <span id="status-dot" class="dot"></span>
        <span id="status-text" class="brand-text">connecting…</span>
        <button id="lang-toggle" class="lang-toggle" title="Language / Idioma">EN</button>
      </div>
    </aside>

    <main id="panel">
      <div class="panel-empty">Loading modules…</div>
    </main>
  </div>
  <script src="/i18n.js"></script>
  <script src="/icons.js"></script>
  <script src="/shell.js"></script>
</body>
</html>
