<svg width="1100" height="640" viewBox="0 0 1100 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1100" height="640" fill="#101012" rx="12"/>
  <!-- dim background hint of sidebar/modules -->
  <rect x="0" y="0" width="240" height="640" fill="#1a1a1d" opacity="0.6"/>
  <rect x="240" y="0" width="860" height="640" fill="#1a1a1d" opacity="0.55"/>

  <!-- palette overlay -->
  <g transform="translate(270,70)">
    <rect width="560" height="500" rx="14" fill="#232327" stroke="#38383f"/>
    <!-- input -->
    <g>
      <text x="22" y="48" fill="#9a9aa2" font-size="16">🔎</text>
      <text x="52" y="50" fill="#e8e8ea" font-size="18">octave</text>
      <rect x="118" y="32" width="2" height="22" fill="#ffb347"/>
      <line x1="0" y1="74" x2="560" y2="74" stroke="#38383f"/>
    </g>

    <text x="22" y="92" fill="#9a9aa2" font-size="11">1405 commands · 456 real tools · 1293 quick actions — showing 6</text>
    <line x1="0" y1="104" x2="560" y2="104" stroke="#38383f"/>

    <!-- selected row -->
    <rect x="0" y="104" width="560" height="44" fill="#2c2c31"/>
    <rect x="0" y="104" width="3" height="44" fill="#ffb347"/>
    <rect x="16" y="118" width="50" height="18" rx="5" fill="#4a3a1a"/>
    <text x="41" y="131" fill="#ffb347" font-size="10" letter-spacing="0.5" text-anchor="middle">ACTION</text>
    <text x="78" y="132" fill="#e8e8ea" font-size="14" font-weight="500">Transpose: Octave Up</text>
    <text x="258" y="132" fill="#9a9aa2" font-size="12">Transpose up octave</text>
    <rect x="490" y="122" width="50" height="18" rx="9" fill="#1a1a1d"/>
    <text x="515" y="135" fill="#9a9aa2" font-size="10" text-anchor="middle">action</text>

    <!-- rows -->
    <g>
      <rect x="16" y="158" width="50" height="18" rx="5" fill="#4a3a1a"/>
      <text x="41" y="171" fill="#ffb347" font-size="10" letter-spacing="0.5" text-anchor="middle">ACTION</text>
      <text x="78" y="172" fill="#e8e8ea" font-size="14" font-weight="500">Transpose: Octave Down</text>
      <text x="278" y="172" fill="#9a9aa2" font-size="12">Transpose down octave</text>

      <rect x="16" y="198" width="50" height="18" rx="5" fill="#1e3a4f"/>
      <text x="41" y="211" fill="#6cc6ff" font-size="10" letter-spacing="0.5" text-anchor="middle">TOOL</text>
      <text x="78" y="212" fill="#e8e8ea" font-size="14" font-weight="500">generate_melody</text>
      <text x="220" y="212" fill="#9a9aa2" font-size="12">Generate melody on a MIDI track</text>
      <rect x="490" y="202" width="56" height="18" rx="9" fill="#1a1a1d"/>
      <text x="518" y="215" fill="#9a9aa2" font-size="10" text-anchor="middle">melody</text>

      <rect x="16" y="238" width="50" height="18" rx="5" fill="#4a3a1a"/>
      <text x="41" y="251" fill="#ffb347" font-size="10" letter-spacing="0.5" text-anchor="middle">ACTION</text>
      <text x="78" y="252" fill="#e8e8ea" font-size="14" font-weight="500">Pitch: Octave</text>
      <text x="180" y="252" fill="#9a9aa2" font-size="12">Shift by octave</text>

      <rect x="16" y="278" width="50" height="18" rx="5" fill="#4a3a1a"/>
      <text x="41" y="291" fill="#ffb347" font-size="10" letter-spacing="0.5" text-anchor="middle">ACTION</text>
      <text x="78" y="292" fill="#e8e8ea" font-size="14" font-weight="500">Fold: Octave Fold</text>
      <text x="208" y="292" fill="#9a9aa2" font-size="12">Fold notes into one octave</text>

      <rect x="16" y="318" width="50" height="18" rx="5" fill="#1e3a4f"/>
      <text x="41" y="331" fill="#6cc6ff" font-size="10" letter-spacing="0.5" text-anchor="middle">TOOL</text>
      <text x="78" y="332" fill="#e8e8ea" font-size="14" font-weight="500">set_tempo</text>
      <text x="170" y="332" fill="#9a9aa2" font-size="12">Set tempo in BPM (20-999)</text>
      <rect x="490" y="322" width="56" height="18" rx="9" fill="#1a1a1d"/>
      <text x="518" y="335" fill="#9a9aa2" font-size="10" text-anchor="middle">session</text>

      <rect x="16" y="358" width="50" height="18" rx="5" fill="#1e3a4f"/>
      <text x="41" y="371" fill="#6cc6ff" font-size="10" letter-spacing="0.5" text-anchor="middle">TOOL</text>
      <text x="78" y="372" fill="#e8e8ea" font-size="14" font-weight="500">harmonize_note</text>
      <text x="220" y="372" fill="#9a9aa2" font-size="12">Add harmony voices to selected MIDI notes</text>
      <rect x="490" y="362" width="62" height="18" rx="9" fill="#1a1a1d"/>
      <text x="521" y="375" fill="#9a9aa2" font-size="10" text-anchor="middle">harmony</text>
    </g>

    <!-- footer hints -->
    <line x1="0" y1="460" x2="560" y2="460" stroke="#38383f"/>
    <g fill="#9a9aa2" font-size="11">
      <text x="22" y="482">↑↓ navigate</text>
      <text x="140" y="482">↵ execute</text>
      <text x="240" y="482">esc close</text>
      <text x="436" y="482">⌘K · 1405 commands</text>
    </g>
  </g>
</svg>
