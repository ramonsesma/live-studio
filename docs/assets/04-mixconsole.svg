<svg width="1100" height="640" viewBox="0 0 1100 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1100" height="640" fill="#1a1a1d" rx="12"/>
  <!-- header -->
  <text x="40" y="50" fill="#e8e8ea" font-size="22">🎛️ Mix Console</text>
  <text x="40" y="74" fill="#9a9aa2" font-size="14">Visual mixer: faders, VU meters, pan and mute/solo per channel.</text>

  <!-- strips -->
  <g transform="translate(40,110)">
    <!-- helper macros not available in SVG; lay out 7 strips manually -->
    <!-- 1 Drum Bus -->
    <g transform="translate(0,0)">
      <rect width="92" height="380" rx="10" fill="#232327" stroke="#38383f"/>
      <text x="46" y="22" fill="#9a9aa2" font-size="11" text-anchor="middle">Drum Bus</text>
      <!-- VU -->
      <rect x="20" y="42" width="14" height="120" rx="5" fill="#1a1a1d"/>
      <rect x="20" y="76" width="14" height="86" rx="0 0 5 5" fill="url(#vuGrad)"/>
      <!-- fader -->
      <rect x="56" y="42" width="26" height="120" rx="5" fill="#1a1a1d"/>
      <rect x="58" y="68" width="22" height="8" rx="3" fill="#ffb347"/>
      <!-- pan -->
      <text x="46" y="186" fill="#9a9aa2" font-size="11" text-anchor="middle">pan</text>
      <rect x="14" y="194" width="64" height="4" rx="2" fill="#1a1a1d"/>
      <circle cx="42" cy="196" r="6" fill="#6cc6ff"/>
      <!-- buttons -->
      <rect x="14" y="212" width="32" height="28" rx="6" fill="#2c2c31"/>
      <text x="30" y="231" fill="#9a9aa2" font-size="12" text-anchor="middle">M</text>
      <rect x="50" y="212" width="32" height="28" rx="6" fill="#ffb347"/>
      <text x="66" y="231" fill="#1a1a1d" font-size="12" font-weight="600" text-anchor="middle">S</text>
    </g>
    <!-- 2 Bass -->
    <g transform="translate(102,0)">
      <rect width="92" height="380" rx="10" fill="#232327" stroke="#38383f"/>
      <text x="46" y="22" fill="#9a9aa2" font-size="11" text-anchor="middle">Bass</text>
      <rect x="20" y="42" width="14" height="120" rx="5" fill="#1a1a1d"/>
      <rect x="20" y="104" width="14" height="58" fill="url(#vuGrad)"/>
      <rect x="56" y="42" width="26" height="120" rx="5" fill="#1a1a1d"/>
      <rect x="58" y="100" width="22" height="8" rx="3" fill="#ffb347"/>
      <text x="46" y="186" fill="#9a9aa2" font-size="11" text-anchor="middle">pan</text>
      <rect x="14" y="194" width="64" height="4" rx="2" fill="#1a1a1d"/>
      <circle cx="32" cy="196" r="6" fill="#6cc6ff"/>
      <rect x="14" y="212" width="32" height="28" rx="6" fill="#ff6b6b"/>
      <text x="30" y="231" fill="#1a1a1d" font-size="12" font-weight="600" text-anchor="middle">M</text>
      <rect x="50" y="212" width="32" height="28" rx="6" fill="#2c2c31"/>
      <text x="66" y="231" fill="#9a9aa2" font-size="12" text-anchor="middle">S</text>
    </g>
    <!-- 3 Synth Lead -->
    <g transform="translate(204,0)">
      <rect width="92" height="380" rx="10" fill="#232327" stroke="#38383f"/>
      <text x="46" y="22" fill="#9a9aa2" font-size="11" text-anchor="middle">Synth Lead</text>
      <rect x="20" y="42" width="14" height="120" rx="5" fill="#1a1a1d"/>
      <rect x="20" y="90" width="14" height="72" fill="url(#vuGrad)"/>
      <rect x="56" y="42" width="26" height="120" rx="5" fill="#1a1a1d"/>
      <rect x="58" y="84" width="22" height="8" rx="3" fill="#ffb347"/>
      <text x="46" y="186" fill="#9a9aa2" font-size="11" text-anchor="middle">pan</text>
      <rect x="14" y="194" width="64" height="4" rx="2" fill="#1a1a1d"/>
      <circle cx="56" cy="196" r="6" fill="#6cc6ff"/>
      <rect x="14" y="212" width="32" height="28" rx="6" fill="#2c2c31"/>
      <text x="30" y="231" fill="#9a9aa2" font-size="12" text-anchor="middle">M</text>
      <rect x="50" y="212" width="32" height="28" rx="6" fill="#2c2c31"/>
      <text x="66" y="231" fill="#9a9aa2" font-size="12" text-anchor="middle">S</text>
    </g>
    <!-- 4 Pad -->
    <g transform="translate(306,0)">
      <rect width="92" height="380" rx="10" fill="#232327" stroke="#38383f"/>
      <text x="46" y="22" fill="#9a9aa2" font-size="11" text-anchor="middle">Pad</text>
      <rect x="20" y="42" width="14" height="120" rx="5" fill="#1a1a1d"/>
      <rect x="20" y="126" width="14" height="36" fill="url(#vuGrad)"/>
      <rect x="56" y="42" width="26" height="120" rx="5" fill="#1a1a1d"/>
      <rect x="58" y="120" width="22" height="8" rx="3" fill="#ffb347"/>
      <text x="46" y="186" fill="#9a9aa2" font-size="11" text-anchor="middle">pan</text>
      <rect x="14" y="194" width="64" height="4" rx="2" fill="#1a1a1d"/>
      <circle cx="46" cy="196" r="6" fill="#6cc6ff"/>
      <rect x="14" y="212" width="32" height="28" rx="6" fill="#2c2c31"/>
      <text x="30" y="231" fill="#9a9aa2" font-size="12" text-anchor="middle">M</text>
      <rect x="50" y="212" width="32" height="28" rx="6" fill="#2c2c31"/>
      <text x="66" y="231" fill="#9a9aa2" font-size="12" text-anchor="middle">S</text>
    </g>
    <!-- 5 Vocal -->
    <g transform="translate(408,0)">
      <rect width="92" height="380" rx="10" fill="#232327" stroke="#38383f"/>
      <text x="46" y="22" fill="#9a9aa2" font-size="11" text-anchor="middle">Vocal</text>
      <rect x="20" y="42" width="14" height="120" rx="5" fill="#1a1a1d"/>
      <rect x="20" y="62" width="14" height="100" fill="url(#vuGrad)"/>
      <rect x="56" y="42" width="26" height="120" rx="5" fill="#1a1a1d"/>
      <rect x="58" y="60" width="22" height="8" rx="3" fill="#ffb347"/>
      <text x="46" y="186" fill="#9a9aa2" font-size="11" text-anchor="middle">pan</text>
      <rect x="14" y="194" width="64" height="4" rx="2" fill="#1a1a1d"/>
      <circle cx="44" cy="196" r="6" fill="#6cc6ff"/>
      <rect x="14" y="212" width="32" height="28" rx="6" fill="#2c2c31"/>
      <text x="30" y="231" fill="#9a9aa2" font-size="12" text-anchor="middle">M</text>
      <rect x="50" y="212" width="32" height="28" rx="6" fill="#2c2c31"/>
      <text x="66" y="231" fill="#9a9aa2" font-size="12" text-anchor="middle">S</text>
    </g>
    <!-- 6 FX -->
    <g transform="translate(510,0)">
      <rect width="92" height="380" rx="10" fill="#232327" stroke="#38383f"/>
      <text x="46" y="22" fill="#9a9aa2" font-size="11" text-anchor="middle">FX Bus</text>
      <rect x="20" y="42" width="14" height="120" rx="5" fill="#1a1a1d"/>
      <rect x="20" y="110" width="14" height="52" fill="url(#vuGrad)"/>
      <rect x="56" y="42" width="26" height="120" rx="5" fill="#1a1a1d"/>
      <rect x="58" y="108" width="22" height="8" rx="3" fill="#ffb347"/>
      <text x="46" y="186" fill="#9a9aa2" font-size="11" text-anchor="middle">pan</text>
      <rect x="14" y="194" width="64" height="4" rx="2" fill="#1a1a1d"/>
      <circle cx="48" cy="196" r="6" fill="#6cc6ff"/>
      <rect x="14" y="212" width="32" height="28" rx="6" fill="#2c2c31"/>
      <text x="30" y="231" fill="#9a9aa2" font-size="12" text-anchor="middle">M</text>
      <rect x="50" y="212" width="32" height="28" rx="6" fill="#2c2c31"/>
      <text x="66" y="231" fill="#9a9aa2" font-size="12" text-anchor="middle">S</text>
    </g>
    <!-- master -->
    <g transform="translate(640,0)">
      <rect width="100" height="380" rx="10" fill="#232327" stroke="#ffb347" stroke-width="2"/>
      <text x="50" y="22" fill="#ffb347" font-size="11" font-weight="500" text-anchor="middle">MASTER</text>
      <rect x="24" y="42" width="14" height="120" rx="5" fill="#1a1a1d"/>
      <rect x="24" y="90" width="14" height="72" fill="url(#vuGrad)"/>
      <rect x="60" y="42" width="26" height="120" rx="5" fill="#1a1a1d"/>
      <rect x="62" y="58" width="22" height="8" rx="3" fill="#ffb347"/>
      <text x="50" y="186" fill="#9a9aa2" font-size="11" text-anchor="middle">level</text>
      <text x="50" y="220" fill="#ffb347" font-size="20" font-weight="600" text-anchor="middle">+0.0</text>
      <text x="50" y="240" fill="#9a9aa2" font-size="11" text-anchor="middle">dB</text>
    </g>
  </g>

  <defs>
    <linearGradient id="vuGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="50%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#5ad17a"/>
    </linearGradient>
  </defs>
</svg>
