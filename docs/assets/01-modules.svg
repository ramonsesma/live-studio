<svg width="1100" height="640" viewBox="0 0 1100 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1100" height="640" fill="#1a1a1d" rx="12"/>
  <!-- sidebar -->
  <rect x="0" y="0" width="248" height="640" fill="#232327"/>
  <line x1="248" y1="0" x2="248" y2="640" stroke="#38383f"/>

  <!-- brand -->
  <rect x="14" y="14" width="38" height="38" rx="10" fill="#2c2c31" stroke="#38383f"/>
  <g transform="translate(23,23) scale(0.83)" fill="none" stroke="#ffb347" stroke-width="2" stroke-linecap="round"><path d="M4 12h0M8 8v8M12 4v16M16 8v8M20 11v2"/></g>
  <text x="62" y="33" fill="#e8e8ea" font-size="15" font-weight="700">Live Studio</text>
  <text x="62" y="49" fill="#9a9aa2" font-size="10" letter-spacing="2">SUPER · EXTENSION</text>
  <line x1="0" y1="66" x2="248" y2="66" stroke="#38383f"/>

  <!-- quick commands -->
  <rect x="14" y="78" width="220" height="34" rx="8" fill="#2c2c31"/>
  <g transform="translate(24,86) scale(0.78)" fill="none" stroke="#e8e8ea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 7l-4 5 4 5M15 7l4 5-4 5"/></g>
  <text x="48" y="100" fill="#e8e8ea" font-size="13.5">Quick commands</text>
  <rect x="196" y="87" width="30" height="17" rx="5" fill="#1a1a1d" stroke="#38383f"/>
  <text x="211" y="99" fill="#9a9aa2" font-size="11" text-anchor="middle">⌘K</text>

  <text x="22" y="134" fill="#9a9aa2" font-size="10" letter-spacing="2">MODULES</text>

  <!-- rows -->
  <g font-size="13.5">
    <!-- active: Session -->
    <rect x="14" y="146" width="220" height="36" rx="9" fill="#2c2c31"/>
    <rect x="6" y="152" width="3" height="24" rx="1.5" fill="#ffb347"/>
    <g transform="translate(22,154) scale(0.8)" fill="none" stroke="#f6a623" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></g>
    <text x="50" y="169" fill="#e8e8ea">Session &amp; Tracks</text>
    <rect x="200" y="155" width="26" height="18" rx="9" fill="#1a1a1d"/><text x="213" y="168" fill="#9a9aa2" font-size="10.5" text-anchor="middle">9</text>

    <g fill="#9a9aa2">
      <!-- Chords -->
      <g transform="translate(22,192) scale(0.8)" fill="none" stroke="#b58ce0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M7 6v8M11 6v8M15 6v8"/></g>
      <text x="50" y="207">Chords &amp; Progressions</text>
      <rect x="200" y="193" width="26" height="18" rx="9" fill="#1a1a1d"/><text x="213" y="206" font-size="10.5" text-anchor="middle">4</text>
      <!-- Drums -->
      <g transform="translate(22,226) scale(0.8)" fill="none" stroke="#e8617a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="8" rx="8" ry="3"/><path d="M4 8v6c0 1.6 3.6 3 8 3s8-1.4 8-3V8"/><path d="M9 12l-3 6M15 12l3 6"/></g>
      <text x="50" y="241">Drums &amp; Patterns</text>
      <rect x="200" y="227" width="26" height="18" rx="9" fill="#1a1a1d"/><text x="213" y="240" font-size="10.5" text-anchor="middle">3</text>
      <!-- EQ -->
      <g transform="translate(22,260) scale(0.8)" fill="none" stroke="#6cc6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4v16M12 4v16M18 4v16"/><circle cx="6" cy="9" r="2"/><circle cx="12" cy="14" r="2"/><circle cx="18" cy="7" r="2"/></g>
      <text x="50" y="275">EQ &amp; Analysis</text>
      <rect x="200" y="261" width="26" height="18" rx="9" fill="#1a1a1d"/><text x="213" y="274" font-size="10.5" text-anchor="middle">3</text>
      <!-- Resonance -->
      <g transform="translate(22,294) scale(0.8)" fill="none" stroke="#57c7e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.6" fill="#57c7e0"/><path d="M12 12l6-3"/></g>
      <text x="50" y="309">Resonance · Mix Radar</text>
      <rect x="200" y="295" width="26" height="18" rx="9" fill="#1a1a1d"/><text x="213" y="308" font-size="10.5" text-anchor="middle">2</text>
      <!-- Vocal -->
      <g transform="translate(22,328) scale(0.8)" fill="none" stroke="#9d8cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M6 11a6 6 0 0 0 12 0M12 17v4M9 21h6"/></g>
      <text x="50" y="343">Vocal Chain &amp; FX</text>
      <rect x="200" y="329" width="26" height="18" rx="9" fill="#1a1a1d"/><text x="213" y="342" font-size="10.5" text-anchor="middle">5</text>
      <!-- SFX -->
      <g transform="translate(22,362) scale(0.8)" fill="none" stroke="#9d8cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5L18 18M18 6l-2.5 2.5M8.5 15.5L6 18"/></g>
      <text x="50" y="377">SFX &amp; Textures</text>
      <rect x="200" y="363" width="26" height="18" rx="9" fill="#1a1a1d"/><text x="213" y="376" font-size="10.5" text-anchor="middle">4</text>
      <!-- FX Chains -->
      <g transform="translate(22,396) scale(0.8)" fill="none" stroke="#6cc6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a3 3 0 0 1 3-3h2a3 3 0 0 1 0 6M15 12a3 3 0 0 1-3 3h-2a3 3 0 0 1 0-6"/></g>
      <text x="50" y="411">FX Chains</text>
      <!-- Session Organizer -->
      <g transform="translate(22,430) scale(0.8)" fill="none" stroke="#7bd88f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h10M4 18h6"/><path d="M16 15l3 3 3-3"/></g>
      <text x="50" y="445">Session Organizer</text>
      <rect x="200" y="431" width="26" height="18" rx="9" fill="#1a1a1d"/><text x="213" y="444" font-size="10.5" text-anchor="middle">7</text>
      <!-- Sample Library Brain -->
      <g transform="translate(22,464) scale(0.8)" fill="none" stroke="#74b8e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4a3 3 0 0 0-3 3 3 3 0 0 0-1 5 3 3 0 0 0 2 4 3 3 0 0 0 4 1V4z"/><path d="M11 4a3 3 0 0 1 3 3 3 3 0 0 1 1 5 3 3 0 0 1-2 4 3 3 0 0 1-4 1"/></g>
      <text x="50" y="479">Sample Library Brain</text>
      <rect x="200" y="465" width="26" height="18" rx="9" fill="#1a1a1d"/><text x="213" y="478" font-size="10.5" text-anchor="middle">1</text>

      <text x="22" y="516" font-size="10" letter-spacing="2">ASSISTANT</text>
      <g transform="translate(22,528) scale(0.8)" fill="none" stroke="#6cc6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="8" width="14" height="11" rx="3"/><circle cx="9.5" cy="13" r="1.3"/><circle cx="14.5" cy="13" r="1.3"/><path d="M12 5v3M9 19v2M15 19v2"/></g>
      <text x="50" y="543">AI Copilot</text>
    </g>
  </g>

  <line x1="0" y1="600" x2="248" y2="600" stroke="#38383f"/>
  <circle cx="24" cy="619" r="4" fill="#5ad17a"/>
  <text x="36" y="623" fill="#9a9aa2" font-size="12">connected</text>

  <!-- main panel -->
  <g transform="translate(282,22)">
    <text x="0" y="22" fill="#e8e8ea" font-size="22">🗂️ Session &amp; Tracks</text>
    <text x="0" y="46" fill="#9a9aa2" font-size="14">Core control: tempo, tracks, solo/mute/arm.</text>

    <g transform="translate(0,72)">
      <rect width="780" height="116" rx="10" fill="#232327" stroke="#38383f"/>
      <text x="16" y="28" fill="#e8e8ea" font-size="15">get_session_info</text>
      <text x="16" y="48" fill="#9a9aa2" font-size="12">Get comprehensive session info: tempo, scale, track/scene counts.</text>
      <rect x="16" y="62" width="96" height="32" rx="8" fill="#ffb347"/>
      <text x="64" y="83" fill="#1a1a1d" font-size="13" font-weight="500" text-anchor="middle">Execute</text>
      <rect x="124" y="62" width="640" height="42" rx="8" fill="#1a1a1d" stroke="#5ad17a"/>
      <text x="138" y="80" fill="#e8e8ea" font-size="11" font-family="ui-monospace, monospace">{ "success": true,</text>
      <text x="138" y="96" fill="#e8e8ea" font-size="11" font-family="ui-monospace, monospace">  "data": { "tempo": 120, "tracks": 8, "scenes": 4, "scaleName": "Major" } }</text>
    </g>

    <g transform="translate(0,208)">
      <rect width="780" height="118" rx="10" fill="#232327" stroke="#38383f"/>
      <text x="16" y="28" fill="#e8e8ea" font-size="15">set_tempo</text>
      <text x="16" y="48" fill="#9a9aa2" font-size="12">Set tempo in BPM (20-999).</text>
      <text x="16" y="68" fill="#9a9aa2" font-size="11">tempo <tspan fill="#ffb347">*</tspan>  BPM value</text>
      <rect x="16" y="74" width="500" height="30" rx="6" fill="#1a1a1d" stroke="#6cc6ff"/>
      <text x="28" y="94" fill="#e8e8ea" font-size="13">124</text>
      <rect x="528" y="74" width="96" height="30" rx="8" fill="#ffb347"/>
      <text x="576" y="94" fill="#1a1a1d" font-size="13" font-weight="500" text-anchor="middle">Execute</text>
    </g>

    <g transform="translate(0,346)">
      <rect width="780" height="116" rx="10" fill="#232327" stroke="#38383f"/>
      <text x="16" y="28" fill="#e8e8ea" font-size="15">create_midi_track</text>
      <text x="16" y="48" fill="#9a9aa2" font-size="12">Create a MIDI track.</text>
      <text x="16" y="68" fill="#9a9aa2" font-size="11">name  Track name</text>
      <rect x="16" y="74" width="500" height="30" rx="6" fill="#1a1a1d" stroke="#38383f"/>
      <text x="28" y="94" fill="#e8e8ea" font-size="13">Bass</text>
      <rect x="528" y="74" width="96" height="30" rx="8" fill="#ffb347"/>
      <text x="576" y="94" fill="#1a1a1d" font-size="13" font-weight="500" text-anchor="middle">Execute</text>
    </g>

    <g transform="translate(0,482)">
      <rect width="780" height="110" rx="10" fill="#232327" stroke="#38383f"/>
      <text x="16" y="28" fill="#e8e8ea" font-size="15">set_track_solo</text>
      <text x="16" y="48" fill="#9a9aa2" font-size="12">Set track solo on/off.</text>
      <text x="16" y="68" fill="#9a9aa2" font-size="11">track_index <tspan fill="#ffb347">*</tspan></text>
      <rect x="16" y="74" width="240" height="28" rx="6" fill="#1a1a1d" stroke="#38383f"/>
      <text x="28" y="93" fill="#e8e8ea" font-size="13">2</text>
      <text x="276" y="68" fill="#9a9aa2" font-size="11">solo <tspan fill="#ffb347">*</tspan></text>
      <rect x="276" y="74" width="240" height="28" rx="6" fill="#1a1a1d" stroke="#38383f"/>
      <text x="288" y="93" fill="#e8e8ea" font-size="13">true</text>
      <rect x="528" y="74" width="96" height="28" rx="8" fill="#ffb347"/>
      <text x="576" y="93" fill="#1a1a1d" font-size="13" font-weight="500" text-anchor="middle">Execute</text>
    </g>
  </g>
</svg>
