<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Live Studio — Module & Tool Catalog</title>
<style>
:root { --bg:#1a1a1d; --bg2:#232327; --bg3:#2c2c31; --line:#38383f; --txt:#e8e8ea; --muted:#9a9aa2; --accent:#ffb347; --accent2:#6cc6ff; --ok:#5ad17a; }
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--txt); font-size:14px; }
header { padding:34px 24px 20px; max-width:1080px; margin:0 auto; }
h1 { margin:0 0 6px; font-size:26px; }
h1 .v { font-size:13px; color:var(--muted); font-weight:400; margin-left:8px; }
.sub { color:var(--muted); margin:0 0 16px; }
.stats { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
.stat { background:var(--bg2); border:1px solid var(--line); border-radius:10px; padding:8px 16px; }
.stat b { font-size:18px; }
.stat span { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:1px; margin-left:6px; }
.controls { display:flex; gap:10px; flex-wrap:wrap; }
input[type=search] { flex:1; min-width:220px; background:var(--bg2); border:1px solid var(--line); color:var(--txt); border-radius:9px; padding:10px 14px; font-size:14px; }
label.flt { display:inline-flex; align-items:center; gap:6px; color:var(--muted); font-size:12.5px; background:var(--bg2); border:1px solid var(--line); border-radius:9px; padding:0 12px; cursor:pointer; }
main { max-width:1080px; margin:0 auto; padding:0 24px 60px; }
.mod { background:var(--bg2); border:1px solid var(--line); border-radius:12px; margin-bottom:14px; overflow:hidden; }
.mod-head { display:flex; align-items:baseline; gap:10px; padding:14px 18px; cursor:pointer; flex-wrap:wrap; }
.mod-head:hover { background:var(--bg3); }
.mod-head h2 { margin:0; font-size:16px; }
.mod-head .id { color:var(--muted); font-size:12px; font-family:ui-monospace,monospace; }
.mod-head .desc { flex-basis:100%; color:var(--muted); font-size:12.5px; margin-top:2px; }
.badge { font-size:10px; text-transform:uppercase; letter-spacing:1px; border-radius:5px; padding:2px 7px; border:1px solid var(--line); }
.badge.panel { color:var(--ok); border-color:var(--ok); }
.badge.demo { color:var(--accent); border-color:var(--accent); }
.badge.advisory { color:var(--accent2); border-color:var(--accent2); }
.badge.n { color:var(--muted); }
.tools { display:none; border-top:1px solid var(--line); }
.mod.open .tools { display:block; }
.tool { padding:12px 18px; border-top:1px solid var(--line); }
.tool:first-child { border-top:none; }
.tool h3 { margin:0 0 3px; font-size:13.5px; font-family:ui-monospace,monospace; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.tool p { margin:0 0 6px; color:var(--muted); font-size:12.5px; }
.params { font-size:12px; color:var(--muted); }
.params code { background:var(--bg3); border-radius:4px; padding:1px 5px; font-size:11.5px; }
.params .req { color:var(--accent); }
.empty { color:var(--muted); text-align:center; padding:40px 0; }
footer { max-width:1080px; margin:0 auto; padding:14px 24px 40px; color:var(--muted); font-size:12px; border-top:1px solid var(--line); }
mark { background:var(--accent); color:#1a1a1d; border-radius:3px; padding:0 2px; }
</style>
</head>

cription":"Synthesizes a detuned supersaw lead through a resonant filter — the classic trance / EDM lead.","panel":true,"tools":[{"name":"how_it_works","fq":"sawlead__how_it_works","description":"How the Saw Lead engine works","demo":false,"advisory":false,"params":[]}]},{"id":"reese","label":"Reese Bass","icon":"🐅","description":"Synthesizes a snarling Reese bass (two saws detuned and beating, slow LFO on cutoff, saturation).","panel":true,"tools":[{"name":"how_it_works","fq":"reese__how_it_works","description":"How the Reese Bass engine works","demo":false,"advisory":false,"params":[]}]},{"id":"marimba","label":"Marimba","icon":"🪵","description":"Synthesizes a wooden mallet / xylo tone (sine + inharmonic odd partials, fast decay, soft click).","panel":true,"tools":[{"name":"how_it_works","fq":"marimba__how_it_works","description":"How the Marimba engine works","demo":false,"advisory":false,"params":[]}]},{"id":"glitch","label":"Glitch FX","icon":"⚡","description":"Seed-driven mosaic of micro-slices each randomly processed (reverse, bitcrush, stutter) — IDM-style FX clips.","panel":true,"tools":[{"name":"how_it_works","fq":"glitch__how_it_works","description":"How the Glitch FX engine works","demo":false,"advisory":false,"params":[]}]},{"id":"tapehiss","label":"Tape Hiss","icon":"📼","description":"Pink-ish band-limited noise bed with wow/flutter and crackle pops — a vinyl/tape lo-fi texture layer.","panel":true,"tools":[{"name":"how_it_works","fq":"tapehiss__how_it_works","description":"How the Tape Hiss engine works","demo":false,"advisory":false,"params":[]}]},{"id":"trumpet","label":"Trumpet","icon":"🎺","description":"Single-voice synth trumpet / solo brass (saw through formant band-pass with vibrato).","panel":true,"tools":[{"name":"how_it_works","fq":"trumpet__how_it_works","description":"How the Trumpet engine works","demo":false,"advisory":false,"params":[]}]},{"id":"epiano","label":"E-Piano","icon":"🎹","description":"Rhodes / DX7-style electric piano (2-op orks","demo":false,"advisory":false,"params":[]}]},{"id":"hihat808","label":"808 Hi-Hat","icon":"🎩","description":"Classic 808-style metallic hi-hat (six square-wave partials, high-passed), closed or open.","panel":true,"tools":[{"name":"how_it_works","fq":"hihat808__how_it_works","description":"How the 808 Hi-Hat engine works","demo":false,"advisory":false,"params":[]}]},{"id":"stabhit","label":"Stab Brass Hit","icon":"💢","description":"A very short, hard-hitting brass/orchestra stab (saw stack + fast filter snap + noise transient).","panel":true,"tools":[{"name":"how_it_works","fq":"stabhit__how_it_works","description":"How the Stab Brass Hit engine works","demo":false,"advisory":false,"params":[]}]},{"id":"glassbell","label":"Glass Bell","icon":"💎","description":"Crystalline glass bell (additive inharmonic partials, brighter and colder than FM Bell).","panel":true,"tools":[{"name":"how_it_works","fq":"glassbell__how_it_works","description":"How the Glass Bell engine works","demo":false,"advisory":false,"params":[]}]},{"id":"subkick","label":"Sub Kick","icon":"🥁","description":"Pure-sine sub layer tuned to a kick fundamental — layer it under Drum Synth's kick for extra low-end.","panel":true,"tools":[{"name":"how_it_works","fq":"subkick__how_it_works","description":"How the Sub Kick engine works","demo":false,"advisory":false,"params":[]}]},{"id":"reversesweep","label":"Reverse-Sweep","icon":"⏪","description":"A rising noise/tone build that stops hard at a hit — reverse-cymbal transition into a downbeat.","panel":true,"tools":[{"name":"how_it_works","fq":"reversesweep__how_it_works","description":"How the Reverse-Sweep engine works","demo":false,"advisory":false,"params":[]}]},{"id":"devremote","label":"Device Remote","icon":"🎛️","description":"Remote-controls every parameter of any device already on a track — including Max for Live instruments — with snapshots and undo.","panel":true,"tools":[{"name":"list_devices","fq":"devremote__list_devices","description":"List every device on a track (name, index, parameter count) — includes Max for Live and third-party devices already on the track","demo":false,"advisory":false,"params":[{"name":"track_index","type":"number","required":true,"description":"Track index"}]},{"name":"get_params","fq":"devremote__get_params","description":"List every parameter of a device with its current value, range and options — works on any device, native or Max for Live","demo":false,"advisory":false,"params":[{"name":"track_index","type":"number","required":true,"description":"Track index"},{"name":"device_index","type":"number","required":true,"description":"Device index"}]},{"name":"set_param","fq":"devremote__set_param","description":"Set a device parameter directly by index or name (undoable via Edit History)","demo":false,"advisory":false,"params":[{"name":"track_index","type":"number","required":true,"description":"Track index"},{"name":"device_index","type":"number","required":true,"description":"Device index"},{"name":"param_index","type":"number","required":false,"description":"Parameter index (or use param_name)"},{"name":"param_name","type":"string","required":false,"description":"Parameter name (or use param_index)"},{"name":"value","type":"number","required":true,"description":"New value (clamped to the param's min/max)"}]},{"name":"reset_param","fq":"devremote__reset_param","description":"Reset one parameter to its default value (undoable)","demo":false,"advisory":false,"params":[{"name":"track_index","type":"number","required":true,"description":"Track index"},{"name":"device_index","type":"number","required":true,"description":"Device index"},{"name":"param_index","type":"number","required":false,"description":"Parameter index (or use param_name)"},{"name":"param_name","type":"string","required":false,"description":"Parameter name (or use param_index)"}]},{"name":"save_snapshot","fq":"devremote__save_snapshot","description":"Save the full current parameter state of a device (e.g. a Max for Live instrument) to storage","demo":false,"advisory":false,"params":[{"name":"track_index","type":"number","required":true,"description":"Track index"},{"name":"device_index","type":"number","required":true,"description":"Device index"},{"name":"name","type":"string","required":true,"description":"Snapshot name"}]},{"name":"list_snapshots","fq":"devremote__list_snapshots","description":"List saved device snapshots","demo":false,"advisory":false,"params":[{"name":"device_name","type":"string","required":false,"description":"Filter by device name"}]},{"name":"load_snapshot","fq":"devremote__load_snapshot","description":"Restore a saved snapshot's parameter values onto the (still-present) device","demo":false,"advisory":false,"params":[{"name":"id","type":"string","required":true,"description":"Snapshot id"}]},{"name":"delete_snapshot","fq":"devremote__delete_snapshot","description":"Delete a saved snapshot","demo":false,"advisory":false,"params":[{"name":"id","type":"string","required":true,"description":"Snapshot id"}]},{"name":"compare_snapshots","fq":"devremote__compare_snapshots","description":"Diff two saved device snapshots parameter-by-parameter","demo":false,"advisory":false,"params":[{"name":"id_a","type":"string","required":true,"description":"First snapshot id"},{"name":"id_b","type":"string","required":true,"description":"Second snapshot id"}]},{"name":"sweep_param","fq":"devremote__sweep_param","description":"Sweep a device parameter from one value to another over real wall-clock time (undoable — restores the pre-sweep value). Useful for filter sweeps/risers/builds without Live's automation UI.","demo":false,"advisory":false,"params":[{"name":"track_index","type":"number","required":true,"description":"Track index"},{"name":"device_index","type":"number","required":true,"description":"Device index"},{"name":"param_index","type":"number","required":false,"description":"Parameter index (or use param_name)"},{"name":"param_name","type":"string","required":false,"description":"Parameter name (or use param_index)"},{"name":"from","type":"number","required":true,"description":"Start value"},{"name":"to","type":"number","required":true,"description":"End value"},{"name":"duration_ms","type":"number","required":false,"description":"Total sweep duration in ms (max 10000, default 2000)"},{"name":"steps","type":"number","required":false,"description":"Number of steps (default 20, max 100)"},{"name":"curve","type":"string","required":false,"description":"Interpolation curve","enum":["linear","exponential","logarithmic"]}]}]},{"id":"stemexport","label":"Stem Export","icon":"📤","description":"Batch-renders every audio track to a real WAV on disk with automatic naming — MIDI tracks are skipped, not faked.","panel":true,"tools":[{"name":"list_export_candidates","fq":"stemexport__list_export_candidates","description":"List which tracks would actually export (audio tracks — MIDI tracks need resampling to audio first)","demo":false,"advisory":false,"params":[]},{"name":"how_it_works","fq":"stemexport__how_it_works","description":"How Stem Export renders and names files","demo":false,"advisory":false,"params":[]},{"name":"export","fq":"stemexport__export","description":"Batch-render every audio track (or a subset) to a real WAV file on disk with automatic naming. MIDI tracks are skipped (resample them to audio first).","demo":false,"advisory":false,"params":[{"name":"track_indices","type":"string","required":false,"description":"Comma-separated track indices (default: all)"},{"name":"name_pattern","type":"string","required":false,"description":"File name pattern with {index}/{name} placeholders (default \"{index}_{name}\")"},{"name":"demo","type":"boolean","required":false,"description":"Write synthetic demo stems instead of rendering"}]}]},{"id":"mixcoach","label":"Mix Coach","icon":"🩺","description":"Combines real health/masking/gain-staging analysis into one prioritized list of concrete next steps, each with the exact tool to run it.","panel":true,"tools":[{"name":"how_it_works","fq":"mixcoach__how_it_works","description":"How Mix Coach prioritizes next steps","demo":false,"advisory":false,"params":[]},{"name":"analyze","fq":"mixcoach__analyze","description":"Run health/masking/gain-staging analysis together and return a single prioritized list of next steps, each with the exact tool+args to act on it.","demo":false,"advisory":false,"params":[{"name":"demo","type":"boolean","required":false,"description":"Use synthetic demo data instead of rendering"}]}]},{"id":"quickactions","label":"Quick Actions","icon":"⌘","description":"83 curated one-click presets that route to real tools — browse by group, or search them in the Cmd-K palette.","panel":true,"tools":[{"name":"list_quick_actions","fq":"quickactions__list_quick_actions","description":"List the quick actions (each routes to a real tool)","demo":false,"advisory":false,"params":[{"name":"query","type":"string","required":false,"description":"Filter substring"}]},{"name":"run_quick_action","fq":"quickactions__run_quick_action","description":"Resolve a quick action to the real tool + args to run","demo":false,"advisory":false,"params":[{"name":"group","type":"string","required":true,"description":"Action group, e.g. 'Tempo'"},{"name":"action","type":"string","required":true,"description":"Action name, e.g. '128 BPM'"}]}]}];
const list = document.getElementById("list");
const q = document.getElementById("q");
const fPanel = document.getElementById("f-panel");
const fReal = document.getElementById("f-real");
const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
function hl(s, term) { if (!term) return esc(s); const i = s.toLowerCase().indexOf(term); if (i < 0) return esc(s); return esc(s.slice(0, i)) + "<mark>" + esc(s.slice(i, i + term.length)) + "</mark>" + esc(s.slice(i + term.length)); }
function render() {
  const term = q.value.trim().toLowerCase();
  list.innerHTML = "";
  let shown = 0;
  for (const m of DATA) {
    if (fPanel.checked && !m.panel) continue;
    let tools = m.tools;
    if (fReal.checked) tools = tools.filter((t) => !t.demo && !t.advisory);
    if (term) {
      const modHit = (m.label + " " + m.id + " " + m.description).toLowerCase().includes(term);
      const toolHits = tools.filter((t) => (t.name + " " + t.description + " " + t.params.map((p) => p.name).join(" ")).toLowerCase().includes(term));
      if (!modHit && !toolHits.length) continue;
      if (!modHit) tools = toolHits;
    }
    if (!tools.length && fReal.checked) continue;
    shown++;
    const el = document.createElement("div");
    el.className = "mod" + (term ? " open" : "");
    el.innerHTML = `
      <div class="mod-head">
        <h2>${esc(m.icon)} ${hl(m.label, term)}</h2>
        <span class="id">${esc(m.id)}</span>
        ${m.panel ? '<span class="badge panel">rich panel</span>' : ""}
        <span class="badge n">${tools.length} tools</span>
        <span class="desc">${hl(m.description, term)}</span>
      </div>
      <div class="tools">${tools.map((t) => `
        <div class="tool">
          <h3>${hl(t.fq, term)}${t.demo ? ' <span class="badge demo" title="Returns simulated data">demo</span>' : ""}${t.advisory ? ' <span class="badge advisory" title="Advisory: suggests, cannot fully execute against the SDK beta">advisory</span>' : ""}</h3>
          <p>${hl(t.description, term)}</p>
          ${t.params.length ? '<div class="params">' + t.params.map((p) => `<code>${esc(p.name)}${p.required ? '<span class="req">*</span>' : ""}: ${esc(p.type)}${p.enum ? " (" + p.enum.map(esc).join("|") + ")" : ""}</code>`).join(" ") + "</div>" : ""}
        </div>`).join("")}</div>`;
    el.querySelector(".mod-head").onclick = () => el.classList.toggle("open");
    list.appendChild(el);
  }
  if (!shown) list.innerHTML = '<div class="empty">No modules match.</div>';
}
q.oninput = render; fPanel.onchange = render; fReal.onchange = render;
render();
</script>
