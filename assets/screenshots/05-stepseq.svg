<svg width="1100" height="640" viewBox="0 0 1100 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1100" height="640" fill="#1a1a1d" rx="12"/>
  <text x="40" y="50" fill="#e8e8ea" font-size="22">🟩 Step Sequencer</text>
  <text x="40" y="74" fill="#9a9aa2" font-size="14">Toggle steps on a clip's 1/16 grid — every cell writes a real MIDI note into the clip.</text>

  <!-- toolbar -->
  <g transform="translate(40,100)">
    <text x="0" y="14" fill="#9a9aa2" font-size="12">Track</text>
    <rect x="0" y="22" width="70" height="30" rx="6" fill="#1a1a1d" stroke="#38383f"/>
    <text x="14" y="42" fill="#e8e8ea" font-size="13">0</text>
    <rect x="90" y="22" width="110" height="30" rx="6" fill="#ffb347"/>
    <text x="145" y="42" fill="#1a1a1d" font-size="13" font-weight="500" text-anchor="middle">Load grid</text>
    <rect x="212" y="22" width="90" height="30" rx="6" fill="#232327" stroke="#38383f"/>
    <text x="257" y="42" fill="#e8e8ea" font-size="13" text-anchor="middle">Clear</text>
    <text x="324" y="42" fill="#9a9aa2" font-size="12">16 steps · 4 lanes · 18 notes</text>
  </g>

  <!-- step grid -->
  <g transform="translate(40,170)">
    <rect width="1020" height="392" rx="10" fill="#101012" stroke="#38383f"/>

    <!-- beat group shading (every 4 steps) -->
    <g fill="#16161a">
      <rect x="150" y="12" width="208" height="368"/>
      <rect x="566" y="12" width="208" height="368"/>
    </g>

    <!-- column numbers -->
    <g fill="#5a5a64" font-size="11" text-anchor="middle">
      <text x="178" y="28">1</text><text x="230" y="28">2</text><text x="282" y="28">3</text><text x="334" y="28">4</text>
      <text x="386" y="28">5</text><text x="438" y="28">6</text><text x="490" y="28">7</text><text x="542" y="28">8</text>
      <text x="594" y="28">9</text><text x="646" y="28">10</text><text x="698" y="28">11</text><text x="750" y="28">12</text>
      <text x="802" y="28">13</text><text x="854" y="28">14</text><text x="906" y="28">15</text><text x="958" y="28">16</text>
    </g>

    <!-- lane labels -->
    <g fill="#e8e8ea" font-size="13">
      <text x="20" y="86">Kick</text>
      <text x="20" y="166">Snare</text>
      <text x="20" y="246">Hi-Hat</text>
      <text x="20" y="326">Clap</text>
    </g>

    <!-- 4 lanes x 16 steps. Each step: 44x44 cell at x=156+col*52, lane y=58+lane*80 -->
    <!-- empty-cell template drawn per row, then active overlays -->
    <g>
      <!-- KICK lane y=58 : active on 1,5,9,13 (accent orange) -->
      <g transform="translate(0,58)">
        <rect x="156" y="0" width="44" height="44" rx="6" fill="#ffb347"/>
        <rect x="208" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="260" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="312" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="364" y="0" width="44" height="44" rx="6" fill="#ffb347"/>
        <rect x="416" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="468" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="520" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="572" y="0" width="44" height="44" rx="6" fill="#ffb347"/>
        <rect x="624" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="676" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="728" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="780" y="0" width="44" height="44" rx="6" fill="#ffb347"/>
        <rect x="832" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="884" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="936" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
      </g>
      <!-- SNARE lane y=138 : active on 5,13 (red) -->
      <g transform="translate(0,138)">
        <rect x="156" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="208" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="260" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
