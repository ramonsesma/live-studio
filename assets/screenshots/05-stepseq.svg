        <rect x="364" y="0" width="44" height="44" rx="6" fill="#ff6b6b"/>
        <rect x="416" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="468" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="520" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="572" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
