        <rect x="780" y="0" width="44" height="44" rx="6" fill="#ff6b6b"/>
        <rect x="832" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="884" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="936" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
      </g>
      <!-- HI-HAT lane y=218 : every odd step (cyan) -->
      <g transform="translate(0,218)">
        <rect x="156" y="0" width="44" height="44" rx="6" fill="#6cc6ff"/>
        <rect x="208" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
        <rect x="260" y="0" width="44" height="44" rx="6" fill="#6cc6ff"/>
        <rect x="312" y="0" width="44" height="44" rx="6" fill="#1d1d21" stroke="#2e2e34"/>
