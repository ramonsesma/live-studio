      <rect width="3" height="44" fill="#5ad17a"/>
      <text x="20" y="28" fill="#e8e8ea" font-size="14" font-weight="500">Bass</text>
      <text x="446" y="28" fill="#9a9aa2" font-size="12" text-anchor="end">8A · energy +0.27</text>
    </g>
    <g transform="translate(0,72)">
      <rect width="460" height="44" rx="8" fill="#232327" stroke="#38383f"/>
      <rect width="3" height="44" fill="#5ad17a"/>
      <text x="20" y="28" fill="#e8e8ea" font-size="14" font-weight="500">Pad</text>
      <text x="446" y="28" fill="#9a9aa2" font-size="12" text-anchor="end">10A · energy −0.11</text>
    </g>
    <g transform="translate(0,126)">
      <rect width="460" height="44" rx="8" fill="#232327" stroke="#38383f"/>
      <text x="20" y="28" fill="#e8e8ea" font-size="14" font-weight="500">Synth Lead</text>
      <text x="446" y="28" fill="#9a9aa2" font-size="12" text-anchor="end">9B · energy +0.05</text>
    </g>
    <g transform="translate(0,180)">
      <rect width="460" height="44" rx="8" fill="#232327" stroke="#38383f"/>
      <text x="20" y="28" fill="#e8e8ea" font-size="14" font-weight="500">Strings</text>
      <text x="446" y="28" fill="#9a9aa2" font-size="12" text-anchor="end">7A · energy +0.32</text>
    </g>

    <text x="0" y="260" fill="#e8e8ea" font-size="15">Suggested transition</text>
    <g transform="translate(0,278)">
      <rect width="460" height="62" rx="8" fill="#232327" stroke="#38383f"/>
      <text x="20" y="28" fill="#e8e8ea" font-size="14">Energy Boost · move +1 Camelot</text>
      <text x="20" y="48" fill="#9a9aa2" font-size="12">Mix into 10A (Pad) for a rising energy transition.</text>
    </g>
