<svg width="1100" height="640" viewBox="0 0 1100 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1100" height="640" fill="#1a1a1d" rx="12"/>
  <text x="40" y="50" fill="#e8e8ea" font-size="22">🎶 Harmonic Mixing</text>
  <text x="40" y="74" fill="#9a9aa2" font-size="14">Camelot wheel: detect a track's key and highlight its compatibles.</text>
  <text x="40" y="100" fill="#9a9aa2" font-size="13">Track 0 → <tspan fill="#e8e8ea">Em · 9A · confidence 0.91</tspan></text>

  <!-- wheel -->
  <g transform="translate(60,140)" font-size="13" text-anchor="middle">
    <!-- 12 segments. Inside=A, outside=B. Positions calculated from center (220, 220), radii 110 (A) and 162 (B). -->
    <!-- 12 o'clock = 1 -->
    <g><circle cx="220" cy="110" r="24" fill="#2c2c31" stroke="#38383f"/><text x="220" y="114" fill="#9a9aa2">1A</text></g>
    <g><circle cx="220" cy="58"  r="24" fill="#38383f" stroke="#38383f"/><text x="220" y="62"  fill="#9a9aa2">1B</text></g>
    <!-- 2 -->
    <g><circle cx="275" cy="124" r="24" fill="#2c2c31" stroke="#38383f"/><text x="275" y="128" fill="#9a9aa2">2A</text></g>
    <g><circle cx="301" cy="83"  r="24" fill="#38383f" stroke="#38383f"/><text x="301" y="87"  fill="#9a9aa2">2B</text></g>
    <!-- 3 -->
    <g><circle cx="315" cy="167" r="24" fill="#2c2c31" stroke="#38383f"/><text x="315" y="171" fill="#9a9aa2">3A</text></g>
    <g><circle cx="361" cy="146" r="24" fill="#38383f" stroke="#38383f"/><text x="361" y="150" fill="#9a9aa2">3B</text></g>
