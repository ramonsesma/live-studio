    <g><circle cx="58" cy="220" r="24" fill="#38383f" stroke="#38383f"/><text x="58" y="224" fill="#9a9aa2">10B</text></g>
    <!-- 11 -->
    <g><circle cx="125" cy="167" r="24" fill="#2c2c31" stroke="#38383f"/><text x="125" y="171" fill="#9a9aa2">11A</text></g>
    <g><circle cx="79" cy="146" r="24" fill="#38383f" stroke="#38383f"/><text x="79" y="150" fill="#9a9aa2">11B</text></g>
    <!-- 12 -->
    <g><circle cx="165" cy="124" r="24" fill="#2c2c31" stroke="#38383f"/><text x="165" y="128" fill="#9a9aa2">12A</text></g>
    <g><circle cx="139" cy="83"  r="24" fill="#38383f" stroke="#38383f"/><text x="139" y="87"  fill="#9a9aa2">12B</text></g>
