    <g><circle cx="382" cy="220" r="24" fill="#38383f" stroke="#38383f"/><text x="382" y="224" fill="#9a9aa2">4B</text></g>
    <!-- 5 -->
    <g><circle cx="315" cy="273" r="24" fill="#2c2c31" stroke="#38383f"/><text x="315" y="277" fill="#9a9aa2">5A</text></g>
    <g><circle cx="361" cy="294" r="24" fill="#38383f" stroke="#38383f"/><text x="361" y="298" fill="#9a9aa2">5B</text></g>
    <!-- 6 -->
    <g><circle cx="275" cy="316" r="24" fill="#2c2c31" stroke="#38383f"/><text x="275" y="320" fill="#9a9aa2">6A</text></g>
    <g><circle cx="301" cy="357" r="24" fill="#38383f" stroke="#38383f"/><text x="301" y="361" fill="#9a9aa2">6B</text></g>
    <!-- 7 (bottom) -->
    <g><circle cx="220" cy="330" r="24" fill="#2c2c31" stroke="#38383f"/><text x="220" y="334" fill="#9a9aa2">7A</text></g>
    <g><circle cx="220" cy="382" r="24" fill="#38383f" stroke="#38383f"/><text x="220" y="386" fill="#9a9aa2">7B</text></g>
    <!-- 8 — compat (green) -->
    <g><circle cx="165" cy="316" r="24" fill="#5ad17a" stroke="#5ad17a"/><text x="165" y="320" fill="#1a1a1d" font-weight="500">8A</text></g>
    <g><circle cx="139" cy="357" r="24" fill="#38383f" stroke="#38383f"/><text x="139" y="361" fill="#9a9aa2">8B</text></g>
    <!-- 9A ACTIVE (orange) -->
    <g><circle cx="125" cy="273" r="28" fill="#ffb347" stroke="#ffb347"/><text x="125" y="278" fill="#1a1a1d" font-weight="700" font-size="14">9A</text></g>
    <!-- 9B compat -->
    <g><circle cx="79" cy="294" r="24" fill="#5ad17a" stroke="#5ad17a"/><text x="79" y="298" fill="#1a1a1d" font-weight="500">9B</text></g>
