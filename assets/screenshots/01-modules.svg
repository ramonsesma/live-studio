<svg width="1100" height="640" viewBox="0 0 1100 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1100" height="640" fill="#1a1a1d" rx="12"/>
  <!-- sidebar -->
  <rect x="0" y="0" width="240" height="640" fill="#232327"/>
  <line x1="240" y1="0" x2="240" y2="640" stroke="#38383f"/>
  <g font-size="14">
    <text x="22" y="36" fill="#e8e8ea" font-size="26">🎛️</text>
    <text x="58" y="33" fill="#e8e8ea" font-size="15" font-weight="500">Live Studio</text>
    <text x="58" y="50" fill="#9a9aa2" font-size="10" letter-spacing="1.5">SUPER-EXTENSION</text>
    <line x1="14" y1="68" x2="226" y2="68" stroke="#38383f"/>

    <!-- palette launcher -->
    <rect x="14" y="80" width="212" height="34" rx="8" fill="#2c2c31"/>
    <text x="28" y="103" fill="#e8e8ea">⌘ Quick commands</text>
    <rect x="180" y="89" width="40" height="18" rx="5" fill="#1a1a1d" stroke="#38383f"/>
    <text x="200" y="102" fill="#9a9aa2" font-size="11" text-anchor="middle">⌘K</text>

    <text x="20" y="138" fill="#9a9aa2" font-size="10" letter-spacing="1.2">MODULES</text>

    <!-- active item -->
    <rect x="14" y="148" width="212" height="36" rx="8" fill="#2c2c31"/>
    <rect x="14" y="148" width="3" height="36" fill="#ffb347"/>
    <text x="28" y="172" fill="#e8e8ea">🗂️</text>
    <text x="50" y="172" fill="#e8e8ea">Session &amp; Tracks</text>
    <rect x="190" y="158" width="28" height="18" rx="9" fill="#1a1a1d"/>
    <text x="204" y="171" fill="#9a9aa2" font-size="10" text-anchor="middle">9</text>

    <g fill="#9a9aa2">
      <text x="28" y="208">🎹</text><text x="50" y="208">Chords &amp; Progressions</text>
      <rect x="190" y="194" width="28" height="18" rx="9" fill="#1a1a1d"/><text x="204" y="207" font-size="10" text-anchor="middle">4</text>

      <text x="28" y="240">🥁</text><text x="50" y="240">Drums &amp; Patterns</text>
      <rect x="190" y="226" width="28" height="18" rx="9" fill="#1a1a1d"/><text x="204" y="239" font-size="10" text-anchor="middle">3</text>

      <text x="28" y="272">🎚️</text><text x="50" y="272">EQ &amp; Analysis</text>
      <rect x="190" y="258" width="28" height="18" rx="9" fill="#1a1a1d"/><text x="204" y="271" font-size="10" text-anchor="middle">4</text>

      <text x="28" y="304">🔗</text><text x="50" y="304">Sidechain</text>
      <text x="28" y="332">🎧</text><text x="50" y="332">Stereo &amp; Imaging</text>
      <text x="28" y="360">✂️</text><text x="50" y="360">Sampler &amp; Slicing</text>
      <text x="28" y="388">🎬</text><text x="50" y="388">Arrangement</text>
      <text x="28" y="416">🎤</text><text x="50" y="416">Vocal Chain</text>
      <text x="28" y="444">🌫️</text><text x="50" y="444">SFX &amp; Textures</text>
      <text x="28" y="472">⛓️</text><text x="50" y="472">FX Chains</text>
      <text x="28" y="500">🧩</text><text x="50" y="500">Session Organizer</text>
      <text x="20" y="544" font-size="10" letter-spacing="1.2">ASSISTANT</text>
      <text x="28" y="572">🤖</text><text x="50" y="572">AI Copilot</text>
    </g>

    <line x1="14" y1="600" x2="226" y2="600" stroke="#38383f"/>
    <circle cx="22" cy="618" r="4" fill="#5ad17a"/>
    <text x="34" y="622" fill="#9a9aa2" font-size="12">connected</text>
  </g>

  <!-- main panel -->
  <g transform="translate(264,22)">
    <text x="0" y="22" fill="#e8e8ea" font-size="22">🗂️ Session &amp; Tracks</text>
    <text x="0" y="46" fill="#9a9aa2" font-size="14">Core control: tempo, tracks, solo/mute/arm.</text>

    <!-- tool card 1 -->
    <g transform="translate(0,72)">
      <rect width="800" height="116" rx="10" fill="#232327" stroke="#38383f"/>
      <text x="16" y="28" fill="#e8e8ea" font-size="15">get_session_info</text>
      <text x="16" y="48" fill="#9a9aa2" font-size="12">Get comprehensive session info: tempo, scale, track/scene counts.</text>
      <rect x="16" y="62" width="96" height="32" rx="8" fill="#ffb347"/>
      <text x="64" y="83" fill="#1a1a1d" font-size="13" font-weight="500" text-anchor="middle">Execute</text>
      <!-- result -->
      <rect x="124" y="62" width="660" height="42" rx="8" fill="#1a1a1d" stroke="#5ad17a"/>
      <text x="138" y="80" fill="#e8e8ea" font-size="11" font-family="ui-monospace, monospace">{ "success": true,</text>
      <text x="138" y="96" fill="#e8e8ea" font-size="11" font-family="ui-monospace, monospace">  "data": { "tempo": 120, "tracks": 8, "scenes": 4, "scaleName": "Major" } }</text>
    </g>

    <!-- tool card 2: set_tempo -->
    <g transform="translate(0,208)">
      <rect width="800" height="118" rx="10" fill="#232327" stroke="#38383f"/>
      <text x="16" y="28" fill="#e8e8ea" font-size="15">set_tempo</text>
      <text x="16" y="48" fill="#9a9aa2" font-size="12">Set tempo in BPM (20-999).</text>
      <text x="16" y="68" fill="#9a9aa2" font-size="11">tempo <tspan fill="#ffb347">*</tspan>  BPM value</text>
      <rect x="16" y="74" width="500" height="30" rx="6" fill="#1a1a1d" stroke="#6cc6ff"/>
      <text x="28" y="94" fill="#e8e8ea" font-size="13">124</text>
      <rect x="528" y="74" width="96" height="30" rx="8" fill="#ffb347"/>
      <text x="576" y="94" fill="#1a1a1d" font-size="13" font-weight="500" text-anchor="middle">Execute</text>
    </g>

    <!-- tool card 3 -->
    <g transform="translate(0,346)">
      <rect width="800" height="116" rx="10" fill="#232327" stroke="#38383f"/>
      <text x="16" y="28" fill="#e8e8ea" font-size="15">create_midi_track</text>
      <text x="16" y="48" fill="#9a9aa2" font-size="12">Create a MIDI track.</text>
      <text x="16" y="68" fill="#9a9aa2" font-size="11">name  Track name</text>
      <rect x="16" y="74" width="500" height="30" rx="6" fill="#1a1a1d" stroke="#38383f"/>
      <text x="28" y="94" fill="#e8e8ea" font-size="13">Bass</text>
      <rect x="528" y="74" width="96" height="30" rx="8" fill="#ffb347"/>
      <text x="576" y="94" fill="#1a1a1d" font-size="13" font-weight="500" text-anchor="middle">Execute</text>
    </g>

    <!-- tool card 4 -->
    <g transform="translate(0,482)">
      <rect width="800" height="110" rx="10" fill="#232327" stroke="#38383f"/>
      <text x="16" y="28" fill="#e8e8ea" font-size="15">set_track_solo</text>
      <text x="16" y="48" fill="#9a9aa2" font-size="12">Set track solo on/off.</text>
      <text x="16" y="68" fill="#9a9aa2" font-size="11">track_index <tspan fill="#ffb347">*</tspan></text>
      <rect x="16" y="74" width="240" height="28" rx="6" fill="#1a1a1d" stroke="#38383f"/>
      <text x="28" y="93" fill="#e8e8ea" font-size="13">2</text>
      <text x="276" y="68" fill="#9a9aa2" font-size="11">solo <tspan fill="#ffb347">*</tspan></text>
      <rect x="276" y="74" width="240" height="28" rx="6" fill="#1a1a1d" stroke="#38383f"/>
      <text x="288" y="93" fill="#e8e8ea" font-size="13">true</text>
      <rect x="528" y="74" width="96" height="28" rx="8" fill="#ffb347"/>
      <text x="576" y="93" fill="#1a1a1d" font-size="13" font-weight="500" text-anchor="middle">Execute</text>
    </g>
  </g>
</svg>
