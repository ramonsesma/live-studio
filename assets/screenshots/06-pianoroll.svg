<svg width="1100" height="640" viewBox="0 0 1100 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1100" height="640" fill="#1a1a1d" rx="12"/>
  <text x="40" y="50" fill="#e8e8ea" font-size="22">🎼 Notation Viewer</text>
  <text x="40" y="74" fill="#9a9aa2" font-size="14">Piano-roll of the clip notes. Color = velocity, height = pitch.</text>

  <!-- toolbar -->
  <g transform="translate(40,100)">
    <text x="0" y="14" fill="#9a9aa2" font-size="12">Track</text>
    <rect x="0" y="22" width="80" height="30" rx="6" fill="#1a1a1d" stroke="#38383f"/>
    <text x="14" y="42" fill="#e8e8ea" font-size="13">0</text>

    <text x="100" y="14" fill="#9a9aa2" font-size="12">Clip</text>
    <rect x="100" y="22" width="80" height="30" rx="6" fill="#1a1a1d" stroke="#38383f"/>
    <text x="114" y="42" fill="#e8e8ea" font-size="13">0</text>

    <rect x="200" y="22" width="120" height="30" rx="6" fill="#ffb347"/>
    <text x="260" y="42" fill="#1a1a1d" font-size="13" font-weight="500" text-anchor="middle">Load notes</text>

    <text x="340" y="42" fill="#9a9aa2" font-size="12">20 notes · C major · 4/4</text>
  </g>

  <!-- piano-roll canvas -->
  <g transform="translate(40,180)">
    <rect width="1020" height="380" rx="10" fill="#101012" stroke="#38383f"/>
    <!-- staff guides -->
    <g stroke="#2a2a30">
      <line x1="0" y1="60" x2="1020" y2="60"/>
      <line x1="0" y1="120" x2="1020" y2="120"/>
      <line x1="0" y1="180" x2="1020" y2="180"/>
      <line x1="0" y1="240" x2="1020" y2="240"/>
      <line x1="0" y1="300" x2="1020" y2="300"/>
      <line x1="0" y1="360" x2="1020" y2="360"/>
    </g>
    <!-- vertical bar lines -->
    <g stroke="#2a2a30" stroke-dasharray="3 5">
      <line x1="255" y1="10" x2="255" y2="370"/>
      <line x1="510" y1="10" x2="510" y2="370"/>
      <line x1="765" y1="10" x2="765" y2="370"/>
    </g>

    <!-- 20 notes (x = start, y = pitch, w = duration, color = velocity hue) -->
    <g>
      <rect x="12"  y="210" width="78" height="18" rx="3" fill="hsl(102,70%,55%)"/>
      <rect x="94"  y="98"  width="38" height="18" rx="3" fill="hsl(60,70%,55%)"/>
      <rect x="140" y="270" width="38" height="18" rx="3" fill="hsl(150,70%,55%)"/>
      <rect x="184" y="154" width="78" height="18" rx="3" fill="hsl(80,70%,55%)"/>
      <rect x="266" y="72"  width="38" height="18" rx="3" fill="hsl(40,70%,55%)"/>
      <rect x="310" y="240" width="38" height="18" rx="3" fill="hsl(170,70%,55%)"/>
      <rect x="354" y="126" width="78" height="18" rx="3" fill="hsl(55,70%,55%)"/>
      <rect x="436" y="184" width="38" height="18" rx="3" fill="hsl(120,70%,55%)"/>
      <rect x="478" y="84"  width="38" height="18" rx="3" fill="hsl(45,70%,55%)"/>
      <rect x="522" y="282" width="78" height="18" rx="3" fill="hsl(160,70%,55%)"/>
      <rect x="604" y="140" width="38" height="18" rx="3" fill="hsl(70,70%,55%)"/>
      <rect x="648" y="212" width="38" height="18" rx="3" fill="hsl(110,70%,55%)"/>
      <rect x="692" y="110" width="78" height="18" rx="3" fill="hsl(50,70%,55%)"/>
      <rect x="774" y="252" width="38" height="18" rx="3" fill="hsl(155,70%,55%)"/>
      <rect x="818" y="56"  width="38" height="18" rx="3" fill="hsl(35,70%,55%)"/>
      <rect x="862" y="168" width="78" height="18" rx="3" fill="hsl(85,70%,55%)"/>
      <rect x="944" y="222" width="38" height="18" rx="3" fill="hsl(115,70%,55%)"/>
      <rect x="944" y="98"  width="38" height="18" rx="3" fill="hsl(58,70%,55%)"/>
      <rect x="52"  y="298" width="38" height="18" rx="3" fill="hsl(140,70%,55%)"/>
      <rect x="226" y="84"  width="38" height="18" rx="3" fill="hsl(42,70%,55%)"/>
    </g>
  </g>
</svg>
