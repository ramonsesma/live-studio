<svg width="1100" height="640" viewBox="0 0 1100 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1100" height="640" fill="#1a1a1d" rx="12"/>
  <!-- sidebar -->
  <rect x="0" y="0" width="248" height="640" fill="#232327"/>
  <line x1="248" y1="0" x2="248" y2="640" stroke="#38383f"/>

  <!-- brand -->
  <rect x="14" y="14" width="38" height="38" rx="10" fill="#2c2c31" stroke="#38383f"/>
  <g transform="translate(23,23) scale(0.83)" fill="none" stroke="#ffb347" stroke-width="2" stroke-linecap="round"><path d="M4 12h0M8 8v8M12 4v16M16 8v8M20 11v2"/></g>
  <text x="62" y="33" fill="#e8e8ea" font-size="15" font-weight="700">Live Studio</text>
  <text x="62" y="49" fill="#9a9aa2" font-size="10" letter-spacing="2">SUPER · EXTENSION</text>
  <line x1="0" y1="66" x2="248" y2="66" stroke="#38383f"/>

  <!-- quick commands -->
  <rect x="14" y="78" width="220" height="34" rx="8" fill="#2c2c31"/>
  <g transform="translate(24,86) scale(0.78)" fill="none" stroke="#e8e8ea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 7l-4 5 4 5M15 7l4 5-4 5"/></g>
  <text x="48" y="100" fill="#e8e8ea" font-size="13.5">Quick commands</text>
  <rect x="196" y="87" width="30" height="17" rx="5" fill="#1a1a1d" stroke="#38383f"/>
  <text x="211" y="99" fill="#9a9aa2" font-size="11" text-anchor="middle">⌘K</text>

  <text x="22" y="134" fill="#9a9aa2" font-size="10" letter-spacing="2">MODULES</text>

  <g font-size="13.5" fill="#9a9aa2">
    <g transform="translate(22,152) scale(0.8)" fill="none" stroke="#f6a623" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></g>
    <text x="50" y="167">Session &amp; Tracks</text>
    <g transform="translate(22,186) scale(0.8)" fill="none" stroke="#b58ce0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M7 6v8M11 6v8M15 6v8"/></g>
    <text x="50" y="201">Chords &amp; Progressions</text>
    <g transform="translate(22,220) scale(0.8)" fill="none" stroke="#e8617a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="8" rx="8" ry="3"/><path d="M4 8v6c0 1.6 3.6 3 8 3s8-1.4 8-3V8"/><path d="M9 12l-3 6M15 12l3 6"/></g>
    <text x="50" y="235">Drums &amp; Patterns</text>
    <g transform="translate(22,254) scale(0.8)" fill="none" stroke="#6cc6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4v16M12 4v16M18 4v16"/><circle cx="6" cy="9" r="2"/><circle cx="12" cy="14" r="2"/><circle cx="18" cy="7" r="2"/></g>
    <text x="50" y="269">EQ &amp; Analysis</text>
    <g transform="translate(22,288) scale(0.8)" fill="none" stroke="#57c7e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.6" fill="#57c7e0"/><path d="M12 12l6-3"/></g>
    <text x="50" y="303">Resonance · Mix Radar</text>
    <g transform="translate(22,322) scale(0.8)" fill="none" stroke="#7bd88f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h10M4 18h6"/><path d="M16 15l3 3 3-3"/></g>
    <text x="50" y="337">Session Organizer</text>
  </g>

  <text x="22" y="376" fill="#9a9aa2" font-size="10" letter-spacing="2">ASSISTANT</text>
  <!-- active: AI Copilot -->
  <rect x="14" y="388" width="220" height="36" rx="9" fill="#2c2c31"/>
  <rect x="6" y="394" width="3" height="24" rx="1.5" fill="#ffb347"/>
  <g transform="translate(22,396) scale(0.8)" fill="none" stroke="#6cc6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="8" width="14" height="11" rx="3"/><circle cx="9.5" cy="13" r="1.3"/><circle cx="14.5" cy="13" r="1.3"/><path d="M12 5v3M9 19v2M15 19v2"/></g>
  <text x="50" y="411" fill="#e8e8ea" font-size="13.5">AI Copilot</text>

  <line x1="0" y1="600" x2="248" y2="600" stroke="#38383f"/>
  <circle cx="24" cy="619" r="4" fill="#5ad17a"/>
  <text x="36" y="623" fill="#9a9aa2" font-size="12">connected</text>

  <!-- main panel: copilot -->
  <g transform="translate(282,22)">
    <text x="0" y="22" fill="#e8e8ea" font-size="22">🤖 AI Copilot</text>
    <text x="0" y="46" fill="#9a9aa2" font-size="14">Control any module via natural language. Uses your tools as functions.</text>

    <g transform="translate(0,72)">
      <text x="0" y="14" fill="#9a9aa2" font-size="12">Provider</text>
      <rect x="0" y="22" width="240" height="30" rx="6" fill="#1a1a1d" stroke="#38383f"/>
      <text x="14" y="42" fill="#e8e8ea" font-size="13">OpenRouter</text>
      <text x="260" y="14" fill="#9a9aa2" font-size="12">API key</text>
      <rect x="260" y="22" width="240" height="30" rx="6" fill="#1a1a1d" stroke="#38383f"/>
      <text x="274" y="42" fill="#e8e8ea" font-size="13">••••••••••</text>
      <text x="520" y="14" fill="#9a9aa2" font-size="12">Model (optional)</text>
      <rect x="520" y="22" width="280" height="30" rx="6" fill="#1a1a1d" stroke="#38383f"/>
      <text x="534" y="42" fill="#e8e8ea" font-size="13">anthropic/claude-3.5-sonnet</text>
    </g>

    <g transform="translate(0,140)">
      <rect x="200" y="0" width="600" height="50" rx="12" fill="#6cc6ff"/>
      <text x="220" y="22" fill="#08283b" font-size="13">create a MIDI track named Bass, generate a pop progression in C minor,</text>
      <text x="220" y="40" fill="#08283b" font-size="13">then a techno beat at 130 BPM</text>

      <rect x="0" y="64" width="640" height="28" rx="10" fill="#2c2c31"/>
      <text x="14" y="83" fill="#9a9aa2" font-size="11" font-family="ui-monospace, monospace">🔧 session__create_midi_track → { "trackIndex": 8, "name": "Bass" }</text>
      <rect x="0" y="100" width="640" height="28" rx="10" fill="#2c2c31"/>
      <text x="14" y="119" fill="#9a9aa2" font-size="11" font-family="ui-monospace, monospace">🔧 chords__generate_chords → { "key":"C", "scale":"minor", "progression":["i","III","VII","iv"] }</text>
      <rect x="0" y="136" width="640" height="28" rx="10" fill="#2c2c31"/>
      <text x="14" y="155" fill="#9a9aa2" font-size="11" font-family="ui-monospace, monospace">🔧 drums__generate_pattern → { "genre":"techno", "clipName":"Techno Pattern" }</text>

      <rect x="0" y="178" width="640" height="74" rx="12" fill="#232327" stroke="#38383f"/>
      <text x="14" y="200" fill="#e8e8ea" font-size="13">Done ✅ Created track <tspan font-weight="500">Bass</tspan>, a <tspan font-weight="500">i–III–VII–iv</tspan> progression in C minor,</text>
      <text x="14" y="220" fill="#e8e8ea" font-size="13">and a <tspan font-weight="500">techno</tspan> pattern at 130 BPM.</text>
      <text x="14" y="240" fill="#9a9aa2" font-size="12">(3 tool calls executed)</text>
    </g>

    <g transform="translate(0,450)">
      <line x1="0" y1="0" x2="800" y2="0" stroke="#38383f"/>
      <rect x="0" y="14" width="690" height="44" rx="8" fill="#1a1a1d" stroke="#38383f"/>
      <text x="14" y="40" fill="#9a9aa2" font-size="13">Type an instruction…</text>
      <rect x="700" y="14" width="100" height="44" rx="8" fill="#ffb347"/>
      <text x="750" y="42" fill="#1a1a1d" font-size="13" font-weight="500" text-anchor="middle">Send</text>
    </g>
  </g>
</svg>
