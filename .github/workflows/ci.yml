name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # The Ableton Extensions SDK + CLI are local-file (beta) deps that are not
      # published to npm and don't exist on CI runners, so we drop them before install.
      #  - The smoke tests reach the SDK only through type-only imports (e.g.
      #    `import { type Song } from "@ableton-extensions/sdk"`), which are erased at
      #    runtime by tsx — so the tests run fine without the package.
      #  - We do NOT build the bundle here: `src/extension.ts` does a *value* import of
      #    the SDK (`import { initialize }`), which must be bundled in, so the real
      #    `.ablx` can only be built where the SDK is installed (locally / on release).
      - name: Remove local-only SDK deps for CI
        run: |
          npm pkg delete dependencies.@ableton-extensions/sdk
          npm pkg delete devDependencies.@ableton-extensions/cli

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Smoke tests (server + 94 modules, simulated song)
        run: npm run test

      # Typecheck needs the real SDK types, which aren't available on CI — run it
      # but don't fail the job (it's enforced locally before commits).
      - name: Typecheck (best-effort, SDK types absent on CI)
        run: npm run typecheck || true
