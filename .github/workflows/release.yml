name: Release

# On every version tag (v1.0.0, v1.2.3, …): run the smoke tests as a gate and
# create the GitHub Release with auto-generated notes.
#
# NOTE: the `.ablx` itself is NOT built here. `src/extension.ts` value-imports the
# Ableton Extensions SDK, which is a local-only beta dependency (not on npm) and must
# be bundled into the entry. So the distributable is built on a machine that has the
# SDK installed and attached to the release:
#
#     npm run package            # build (esbuild, SDK bundled) + Info-ZIP .ablx
#     gh release upload <tag> live-studio.ablx --clobber
#
# `npm run package` self-checks the result (strict X.Y.Z version, manifest at root,
# CJS entry, no zip data descriptors) before it is uploaded.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Remove local-only SDK deps for CI
        run: |
          npm pkg delete dependencies.@ableton-extensions/sdk
          npm pkg delete devDependencies.@ableton-extensions/cli

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Smoke tests
        run: npm run test

      - name: Create / update the GitHub Release (notes only; .ablx uploaded locally)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
